services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multstudio-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:18-alpine
    container_name: multstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multstudio
      POSTGRES_USER: multstudio
      POSTGRES_PASSWORD: multstudio_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: multstudio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
