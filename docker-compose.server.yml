services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: multstudio-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - default
      - caddy-shared

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: multstudio-api
    restart: unless-stopped
    command: ["node", "dist-backend/server.js"]
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://multstudio:multstudio_dev_password@postgres:5432/multstudio
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1.5}
      OPENAI_IMAGE_SIZE: ${OPENAI_IMAGE_SIZE:-1536x1024}
      OPENAI_IMAGE_QUALITY: ${OPENAI_IMAGE_QUALITY:-medium}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - caddy-shared

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: multstudio-worker
    restart: unless-stopped
    command: ["node", "dist-backend/worker.js"]
    environment:
      DATABASE_URL: postgresql://multstudio:multstudio_dev_password@postgres:5432/multstudio
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_IMAGE_MODEL: ${OPENAI_IMAGE_MODEL:-gpt-image-1.5}
      OPENAI_IMAGE_SIZE: ${OPENAI_IMAGE_SIZE:-1536x1024}
      OPENAI_IMAGE_QUALITY: ${OPENAI_IMAGE_QUALITY:-medium}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default

  postgres:
    image: postgres:17-alpine
    container_name: multstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multstudio
      POSTGRES_USER: multstudio
      POSTGRES_PASSWORD: multstudio_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multstudio -d multstudio"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: multstudio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:

networks:
  caddy-shared:
    external: true
    name: shorts-factory_web
