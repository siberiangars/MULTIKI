services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multstudio-web
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - default
      - caddy-shared

  postgres:
    image: postgres:17-alpine
    container_name: multstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multstudio
      POSTGRES_USER: multstudio
      POSTGRES_PASSWORD: multstudio_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: multstudio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:

networks:
  caddy-shared:
    external: true
    name: shorts-factory_web
