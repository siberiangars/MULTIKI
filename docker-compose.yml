services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: multstudio-web
    ports:
      - "8080:80"
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: multstudio-api
    command: ["node", "dist-backend/server.js"]
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://multstudio:multstudio_dev_password@postgres:5432/multstudio
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: multstudio-worker
    command: ["node", "dist-backend/worker.js"]
    environment:
      DATABASE_URL: postgresql://multstudio:multstudio_dev_password@postgres:5432/multstudio
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: multstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multstudio
      POSTGRES_USER: multstudio
      POSTGRES_PASSWORD: multstudio_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multstudio -d multstudio"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:8-alpine
    container_name: multstudio-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  redis-data:
