services:
  caddy:
    image: caddy:2.10-alpine
    container_name: multstudio-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multstudio-web
    restart: unless-stopped
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17-alpine
    container_name: multstudio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: multstudio
      POSTGRES_USER: multstudio
      POSTGRES_PASSWORD: multstudio_dev_password
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    container_name: multstudio-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  caddy-data:
  caddy-config:
  postgres-data:
  redis-data:
